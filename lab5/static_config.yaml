components_manager:
  task_processors:
    main-task-processor:
      worker_threads: 4
    fs-task-processor:
      worker_threads: 2
  default_task_processor: main-task-processor

  components:
    logging:
      fs-task-processor: fs-task-processor
      loggers:
        default:
          file_path: '@stderr'
          level: info

    server:
      listener:
        port: 8080
        task_processor: main-task-processor
      listener-monitor:
        port: 8081
        task_processor: main-task-processor

    dns-client:
      fs-task-processor: fs-task-processor

    testsuite-support:
      testsuite-tasks-enabled: false

    default-secdist-provider:
      config: /service/secure_data.json
      missing-ok: false
      environment-secrets-key: SECDIST_CONFIG

    secdist: {}

    dynamic-config:
      defaults:
        POSTGRES_CONNECTION_POOL_SETTINGS:
          postgres-db:
            min_pool_size: 4
            max_pool_size: 16
            max_queue_size: 200
        POSTGRES_STATEMENT_METRICS_SETTINGS:
          postgres-db:
            max_statement_metrics: 30

    postgres-db:
      dbconnection: postgresql://hotel_user:hotel_password@db:5432/hotel_booking
      blocking_task_processor: fs-task-processor
      dns_resolver: getaddrinfo

    redis-cache:
      groups:
        - config_name: redis-cache
          db: cache
          sharding_strategy: RedisStandalone
          allow_reads_from_master: true
      subscribe_groups: []
      thread_pools:
        redis_thread_pool_size: 4
        sentinel_thread_pool_size: 1

    token-store: {}

    handler-root:
      path: /
      method: GET
      task_processor: main-task-processor

    handler-register-user:
      path: /auth/register
      method: POST
      task_processor: main-task-processor

    handler-login:
      path: /auth/login
      method: POST
      task_processor: main-task-processor

    handler-user-by-login:
      path: /users/by-login/{login}
      method: GET
      task_processor: main-task-processor

    handler-user-search:
      path: /users/search
      method: GET
      task_processor: main-task-processor

    handler-create-hotel:
      path: /hotels
      method: POST
      task_processor: main-task-processor

    handler-list-hotels:
      path: /hotels
      method: GET
      task_processor: main-task-processor

    handler-search-hotels:
      path: /hotels/search
      method: GET
      task_processor: main-task-processor

    handler-create-booking:
      path: /bookings
      method: POST
      task_processor: main-task-processor

    handler-user-bookings:
      path: /users/{user_id}/bookings
      method: GET
      task_processor: main-task-processor

    handler-cancel-booking:
      path: /bookings/{booking_id}/cancel
      method: PATCH
      task_processor: main-task-processor
